name: génération de local.txt

on:
  schedule:
    - cron: '0 2,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v6

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          check-latest: true

      - name: Exécuter local_blocklist.py
        run: python scripts/local_blocklist.py

      - name: Commit et push de local.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add filtresLocaux.txt
          git commit -m "🤖 mise à jour local.txt - $(date '+%d/%m/%Y %H:%M')" || echo "aucun changement à committer"
          git push
